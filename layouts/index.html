
{{ define "main" }}
  <div class="custom-background">
  {{ range .Site.RegularPages }}
    <article>
      {{ $format := "2006-01-02" }}
      <h2 class="summary">{{ .Date.Format $format }} <a href="{{ .Permalink | relURL }}">{{ .Title }}</a></h2>

      <div class="summary">
	{{ .Summary  }}
  	<a href="{{ .Permalink | relURL }}">Read More</a>
      </div>
    </article>
  {{ end }}
  </div>
{{ end }}
