baseURL = 'https://localhost:1313/'
locale = 'en-us'
title = 'Fear Is The Mind Killer'

theme = 'astra-pro'


[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[deployment]
  confirm = false
  dryRun = false
  force = false
  invalidateCDN = true
  maxDeletes = 256
  target = ''
  workers = 10

[caches]
  [cache.images]
    dir = ':cacheDir/images'
