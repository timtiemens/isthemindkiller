
<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>THIS IS baseof.html {{ .Title }}</title>
{{ partial "css.html" . }}
</head>
<body>
{{ partial "header.html" . }}

<div class="container">
<div class="wrapper">
  {{ if eq .Site.Params.sidebar "left" }}<aside class="sidebar">{{ partial "sidebar.html" . }}</aside>{{ end }}

  <div class="content-area">
    {{ block "main" . }}{{ end }}
  </div>

  {{ if eq .Site.Params.sidebar "right" }}<aside class="sidebar">{{ partial "sidebar.html" . }}</aside>{{ end }}
</div>
</div>

{{ partial "footer.html" . }}
</body>
</html>
